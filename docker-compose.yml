version: '3.8'

services:
  redis:
    image: redis:alpine
    restart: always

  web:
    image: semaftw/superlists:latest
    restart: always
    expose:
      - "8888"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - static_volume:/app/staticfiles
    command: >
      sh -c "gunicorn --bind 0.0.0.0:8888 connectivity_checker_app.wsgi:application"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
    depends_on:
      - web

  worker:
    image: semaftw/superlists:latest
    restart: always
    command: celery -A connectivity_checker_app worker -l info
    env_file: .env
    depends_on:
      - redis
      - web

  beat:
    image: semaftw/superlists:latest
    restart: always
    command: celery -A connectivity_checker_app beat -l info
    env_file: .env
    depends_on:
      - redis
      - web

volumes:
  static_volume: