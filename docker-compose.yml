version: '3.8'

services:
  redis:
    image: redis:alpine
    restart: always

  web:
    image: semaftw/superlists:latest
    restart: always
    expose:
      - "8888"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - static_volume:/app/staticfiles
    command: >
      sh -c "gunicorn --bind 0.0.0.0:8888 connectivity_checker_app.wsgi:application"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
    depends_on:
      - web

  worker:
    image: semaftw/superlists:latest
    restart: always
    command: celery -A connectivity_checker_app worker -l info
    env_file: .env
    depends_on:
      - redis
      - web

  beat:
    image: semaftw/superlists:latest
    restart: always
    command: celery -A connectivity_checker_app beat -l info
    env_file: .env
    depends_on:
      - redis
      - web

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - web

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

volumes:
  static_volume:
  prometheus_data:
  grafana_data:
