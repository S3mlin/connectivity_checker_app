name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: semaftw/superlists:latest
          cache-from: type=registry,ref=semaftw/superlists:buildcache
          cache-to: type=registry,ref=semaftw/superlists:buildcache,mode=max

  deploy:
    name: Deploy to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Navigating to app directory..."
            cd /home/ubuntu
            
            echo "Pulling latest Docker images..."
            docker compose pull
            
            echo "Restarting containers with new images..."
            docker compose up -d
            
            echo "Running database migrations..."
            docker compose exec -T web python manage.py migrate
            
            echo "Deployment successful!"