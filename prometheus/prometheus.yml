global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'django-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['web:8888'] # Talks directly to Gunicorn bypassing Nginx!

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']